<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE VENDE | Accesorios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(135deg, #ffffff 0%, #fce4ec 50%, #e1bee7 100%); color: #333; min-height: 100vh; }
        header { background: linear-gradient(135deg, #f8bbd0 0%, #ce93d8 100%); padding: 25px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { color: #6a1b9a; font-size: 2.8em; text-shadow: 1px 1px 2px white; }
        header p { color: #4a148c; font-weight: bold; font-size: 1.1em; margin-top: 5px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(206, 147, 216, 0.5); border: 3px solid #f8bbd0; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 25px; }
        .info h3 { color: #8e24aa; margin-bottom: 10px; font-size: 1.4em; }
        .info p { color: #555; margin-bottom: 15px; line-height: 1.5; }
        .btn { display: block; background: #25D366; color: white; text-align: center; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: background 0.3s; }
        .btn:hover { background: #1ebe5d; }
        footer { background: #f3e5f5; text-align: center; padding: 25px; margin-top: 50px; color: #6a1b9a; font-weight: bold; }
        .tag { background: #c8e6c9; color: #1b5e20; padding: 6px 12px; border-radius: 20px; font-size: 0.9em; display: inline-block; margin-bottom: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>✨ SE VENDE ✨</h1>
        <p>Pulseritas | Bolsos | Perfumes</p>
    </header>
    <div class="container">
        <div class="productos">
            <div class="card">
                <img src="IMG-20260531-WA0085.jpg" alt="Pulseras Artesanales">
                <div class="info">
                    <span class="tag">Pulseritas</span>
                    <h3>Pulseras de Hilo y Piedras</h3>
                    <p>Hechas a mano. Varios colores y diseños únicos.</p>
                    <a href="https://wa.me/51921504438" class="btn">Pedir por WhatsApp</a>
                </div>
            </div>
            <div class="card">
                <img src="IMG-20260531-WA0084.jpg" alt="Bolsos y Monederos">
                <div class="info">
                    <span class="tag">Bolsos</span>
                    <h3>Bolsos y Monederos</h3>
